<!DOCTYPE html>

<body>
    <header></header>
    <main>
        <form action="" method="post">

            </div>

                </select>
            </div>
            <div class="form-group">
                <label for="">Personal Externo (Entrega):</label>
                <select name="" id="">
                    <option value="">Seleccione una opción valida</option>
                    <option value="">Tyler Rojas V.</option>
                </select>
            </div>
            <div class="form-group">
                <label for="">Tipo (P/M/D):</label>
                <select name="" id="">
                    <option value="">Seleccione una opción valida</option>
                    <option value="">Programación</option>
                    <option value="">Mantenimiento</option>
                    <option value="">Dar de baja</option>

            </div>
            <div class="form-group">

            </div>
            <div class="form-group">
                <label for="">Dato de la empresa:</label>
                <input type="checkbox" name="" id="">
            </div>
            <div class="form-group">
                <label for="">Factura:</label>
                <input type="checkbox" name="" id="">
            </div>
            <div class="form-group">
                <label for="">ID empresa:</label>
                <input type="checkbox" name="" id="">
            </div>
            <div class="form-group">
                <label for="">Modelo de radio:</label>
                <input type="text" name="" id="">
            </div>
            <div class="form-group">
                <label for="">Cantidad:</label>
                <input type="number" inputmode="numeric" name="" id="">
            </div>
            <div class="form-group">
                <label for="">Programador SONDA:</label>
                <select name="" id="">
                    <option value="">Seleccione una opción valida</option>
                    <option value="">Tyler Rojas V.</option>
                </select>
            </div>
            <div class="form-group">
                <label for="">Fecha Entrega:</label>

            </div>
            <div class="form-group">
                <label for="">Personal SONDA (Entrega):</label>
                <select name="" id="">
                    <option value="">Seleccione una opción valida</option>
                    <option value="">Tyler Rojas V.</option>
                </select>
            </div>
            <div class="form-buttons">
                <button type="submit">Guardar</button>
                <button type="button">Guardar a Excel</button>
                <button type="reset">Limpiar formulario</button>
                <button type="button">Terminar Programación</button>
            </div>
        </form>
        <hr>

        <table>
